# HTTPS 적용 후 사용 (setup-https.sh 가 자동 호출)
# docker compose -f docker-compose.oracle.yml -f docker-compose.oracle.https.yml ...

services:
  frontend:
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt:ro
      - ./deploy/oracle/generated/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
