server:
  port: 8082

spring:
  application:
    name: bizgrant

  datasource:
    url: jdbc:postgresql://localhost:5433/bizgrant
    username: postgres
    password: bizgrant2026!
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:dev}
    password: ${MAIL_PASSWORD:dev}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  newsletter:
    enabled: ${NEWSLETTER_ENABLED:true}
    cron: "0 0 9 * * MON"
    from: ${NEWSLETTER_FROM:noreply@bizgrant.kr}
    site-url: ${SITE_URL:http://localhost:3000}
    top-count: 10
    urgent-count: 5
    lookback-days: 7

  jwt:
    secret: ${JWT_SECRET:granthunter-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

  admin:
    emails: freecompr20@gmail.com
    initial-password: ${ADMIN_PASSWORD:BizGrant2026!}
    initial-name: 관리자
    initial-company: 에드가씨에스티

  alert:
    site-name: BizGrant
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
    solapi:
      api-key: ${SOLAPI_API_KEY:}
      api-secret: ${SOLAPI_API_SECRET:}
      sender: ${SOLAPI_SENDER:}
    kakao:
      pf-id: ${KAKAO_PF_ID:}
      template-id: ${KAKAO_TEMPLATE_ID:}
      content-variable: ${KAKAO_CONTENT_VARIABLE:#{내용}}

  upload:
    path: ${UPLOAD_PATH:./uploads}

  grant-sync:
    enabled: ${GRANT_SYNC_ENABLED:false}
    cron: "0 0 8,16 * * *"
    page-delay-ms: 500
    max-pages-per-source: 500
    max-detail-pages: 30
    public-data:
      api-key: ${PUBLIC_DATA_API_KEY:4kpciVHyniZJV%2BUGGyjbU80aUlB1VqT2BHBRMimmTdySD9O89LhD%2B3JYi%2FpZieBhoDnf5NjvrpBEjIK05TfNpA%3D%3D}
      base-url: https://apis.data.go.kr/1421000/bizinfo
      page-size: 50
    g2b:
      base-url: https://apis.data.go.kr/1230000/ad/BidPublicInfoService
      lookback-days: 90
      chunk-days: 14
      page-size: 100
    g2b-award:
      base-url: https://apis.data.go.kr/1230000/as/ScsbidInfoService
      lookback-days: 90
      chunk-days: 14
      page-size: 100
      display-days: 90
    sources:
      - name: bizinfo
        url: https://www.bizinfo.go.kr
        enabled: true
        type: API
        max-pages: 40
      - name: mss
        url: https://www.mss.go.kr
        enabled: true
        type: HTML
        list-path: /site/smba/ex/bbs/List.do?cbIdx=81
        max-pages: 5
      - name: kstartup
        url: https://www.k-startup.go.kr
        enabled: true
        type: HTML
        list-path: /web/contents/bizpbanc-ongoing.do
        max-pages: 5
      - name: g2b
        url: https://www.g2b.go.kr
        enabled: true
        type: API
        max-pages: 20
      - name: g2b-award
        url: https://www.g2b.go.kr
        enabled: true
        type: API
        max-pages: 20
      - name: kosme
        url: https://www.kosmes.or.kr
        enabled: true
        type: HTML
        list-path: /main/notice/noticeList.do
        page-param: pageIndex
        organization: 중소기업진흥공단
        max-pages: 5
      - name: kita
        url: https://www.kita.or.kr
        enabled: true
        type: API
        max-pages: 20
      - name: sba
        url: https://www.sba.seoul.kr
        enabled: true
        type: API
        max-pages: 20
      - name: kotra
        url: https://www.kotra.or.kr
        enabled: true
        type: API
        max-pages: 20
      - name: kised
        url: https://www.kised.or.kr
        enabled: true
        type: API
        max-pages: 20
      - name: kocca
        url: https://www.kocca.kr
        enabled: true
        type: API
        max-pages: 20

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.granthunter: INFO
