server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/bizgrant}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.granthunter: INFO
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
  admin:
    emails: ${ADMIN_EMAILS:freecompr20@gmail.com}
    initial-password: ${ADMIN_PASSWORD:BizGrant2026!}
    initial-name: 관리자
    initial-company: 에드가씨에스티
  newsletter:
    site-url: ${SITE_URL}
    from: ${NEWSLETTER_FROM:noreply@bizgrant.kr}
    enabled: ${NEWSLETTER_ENABLED:true}
    cron: "0 0 9 * * MON"
  grant-sync:
    enabled: ${GRANT_SYNC_ENABLED:true}
    cron: ${GRANT_SYNC_CRON:0 0 3 * * *}
    public-data:
      api-key: ${PUBLIC_DATA_API_KEY:4kpciVHyniZJV%2BUGGyjbU80aUlB1VqT2BHBRMimmTdySD9O89LhD%2B3JYi%2FpZieBhoDnf5NjvrpBEjIK05TfNpA%3D%3D}
