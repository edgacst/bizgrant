spring:
  datasource:
    url: jdbc:h2:mem:granthunter_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hs256-algorithm-testing
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
