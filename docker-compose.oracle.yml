# BizGrant — Oracle Cloud Always Free 배포용
# 사용: deploy/oracle/README.md 참고

services:
  postgres:
    image: postgres:16-alpine
    container_name: bizgrant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizgrant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bizgrant}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - bizgrant

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bizgrant-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bizgrant}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY:?PUBLIC_DATA_API_KEY required}
      SITE_URL: ${SITE_URL:?SITE_URL required}
      NEWSLETTER_FROM: ${NEWSLETTER_FROM:-noreply@bizgrant.kr}
      NEWSLETTER_ENABLED: ${NEWSLETTER_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      TZ: Asia/Seoul
      GRANT_SYNC_ENABLED: ${GRANT_SYNC_ENABLED:-true}
      GRANT_SYNC_CRON: ${GRANT_SYNC_CRON:-0 0 3 * * *}
      JAVA_OPTS: ${JAVA_OPTS:--Xms384m -Xmx1024m -XX:+UseG1GC}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - bizgrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bizgrant-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bizgrant

volumes:
  pgdata:

networks:
  bizgrant:
    driver: bridge
